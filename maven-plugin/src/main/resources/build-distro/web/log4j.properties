# OpenMRS log4j configuration for runtime debugging.
# This file is mounted into the container via docker-compose.override.yml:
#   /usr/local/tomcat/lib/log4j.properties
#
# Adjust log levels below as needed.  The default here enables DEBUG on
# the packages most useful for diagnosing Spring context and module issues.

log4j.rootLogger=INFO, stdout

log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%p - %C{1}.%M(%L) |%d{ISO8601}| %m%n

# Spring MVC — DispatcherServlet handler mapping registration and dispatch
log4j.logger.org.springframework.web.servlet=DEBUG

# Spring context — ApplicationContext refresh lifecycle
log4j.logger.org.springframework.context=DEBUG

# OpenMRS web — Listener, WebContextRefresher, module servlet registration
log4j.logger.org.openmrs.web=DEBUG

# OpenMRS module loading
log4j.logger.org.openmrs.module=DEBUG
