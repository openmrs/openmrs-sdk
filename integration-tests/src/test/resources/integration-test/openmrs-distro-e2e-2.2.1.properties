# E2E test distribution for OpenMRS platform 2.2.x.
# Dockerfile code path: 2.0-2.4 (Dockerfile-jre8, mysql:5.6)
#
# To reproduce manually:
#   1. Copy this file to an empty directory as openmrs-distro.properties
#   2. mvn openmrs-sdk:build-distro -Ddistro=openmrs-distro.properties -Ddir=docker
#   3. docker compose -f docker/docker-compose.yml up --build
#   4. Browse to http://localhost:8080/openmrs
#
# Module versions:
#   addresshierarchy 2.21.0 — requires OpenMRS 1.9.12+ at runtime; validated across
#   all version lines in openmrs-module-pihmalawi and openmrs-distro-pihemr histories.
#   owa.orderentry 1.2.5    — latest release of the Order Entry OWA.
name=OpenMRS E2E Test 2.2.1
version=1.0.0
war.openmrs=2.2.1
omod.addresshierarchy=2.21.0
owa.orderentry=1.2.5
omod.legacyui=1.5.0
omod.owa=1.10.0
omod.webservices.rest=2.39.0
